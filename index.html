<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香港急症室輪候時間｜Live</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
    
    #header {
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
      z-index: 1000;
    }
    #header h1 { font-size: 1.3rem; }
    #header h1 span { font-size: 1.1rem; margin-right: 6px; }
    #update-info { font-size: 0.75rem; opacity: 0.85; text-align: right; }
    #update-info .time { font-size: 0.9rem; font-weight: bold; }
    #update-info .countdown { font-size: 0.7rem; opacity: 0.7; }
    
    #refresh-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 12px;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: rgba(255,255,255,0.3); }
    
    #map { height: calc(100vh - 60px); width: 100%; }

    /* ── Side Panel ─────────────────────────────────── */
    #side-panel {
      position: absolute;
      top: 60px; left: 0;
      width: 320px;
      height: calc(100vh - 60px);
      background: white;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 12px rgba(0,0,0,0.12);
    }
    #panel-header {
      padding: 10px 12px 8px;
      background: #fff8f8;
      border-bottom: 2px solid #ffcdd2;
      flex-shrink: 0;
    }
    #panel-header h3 { font-size: 0.85rem; color: #c62828; margin-bottom: 6px; }
    .sort-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .sort-btn {
      padding: 3px 9px; border: 1.5px solid #ef9a9a;
      background: white; color: #c62828; border-radius: 12px;
      cursor: pointer; font-size: 0.7rem; font-weight: 600;
      transition: all 0.15s;
    }
    .sort-btn:hover { background: #ffcdd2; }
    .sort-btn.active { background: #c62828; color: white; border-color: #c62828; }

    #hospital-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
    }
    .hosp-row {
      padding: 8px 12px;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; flex-direction: column; gap: 3px;
    }
    .hosp-row:hover { background: #fff3e0; }
    .hosp-row.active { background: #ffebee; border-left: 3px solid #c62828; }
    .hosp-row-top { display: flex; align-items: center; gap: 6px; }
    .hosp-row-name { font-size: 0.8rem; font-weight: bold; color: #333; flex: 1; }
    .hosp-row-badge {
      font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
      border-radius: 10px; color: white; flex-shrink: 0;
    }
    .hosp-row-times { display: flex; gap: 8px; flex-wrap: wrap; }
    .hosp-time-chip {
      font-size: 0.65rem; color: #666; padding: 1px 5px;
      background: #f5f5f5; border-radius: 4px;
    }
    .hosp-time-chip span { font-weight: 600; }
    #panel-footer {
      padding: 6px 12px;
      background: #fafafa;
      border-top: 1px solid #eee;
      font-size: 0.65rem; color: #aaa;
      flex-shrink: 0;
    }
    
    #legend {
      position: absolute;
      bottom: 30px;
      right: 10px;
      background: white;
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 1000;
      font-size: 0.78rem;
      min-width: 150px;
    }
    #legend h4 { margin-bottom: 8px; font-size: 0.85rem; color: #333; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    
    #info-panel {
      position: absolute;
      top: 70px;
      left: 10px;
      background: white;
      padding: 14px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 1000;
      font-size: 0.78rem;
      max-width: 200px;
      display: none;
    }
    #info-panel.show { display: block; }
    #info-panel .triage { font-size: 0.7rem; color: #666; margin-bottom: 4px; }
    #info-panel .wt { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 6px; }
    #info-panel .desc { font-size: 0.7rem; color: #888; line-height: 1.4; }
    #info-panel .pct { font-size: 0.75rem; color: #555; margin-top: 4px; }
    
    .marker-label {
      background: transparent;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 11px;
      text-align: center;
      width: 100%;
      line-height: 1;
    }
    
    .popup-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .popup-table th { background: #c62828; color: white; padding: 6px 10px; text-align: left; }
    .popup-table td { padding: 5px 10px; border-bottom: 1px solid #eee; }
    .popup-table tr:last-child td { border-bottom: none; }
    .popup-table .triage-col { font-weight: bold; }
    .popup-table .time-col { text-align: right; font-weight: bold; }
    .popup-table .green { color: #2e7d32; }
    .popup-table .yellow { color: #f57f17; }
    .popup-table .orange { color: #e65100; }
    .popup-table .red { color: #c62828; }
    .popup-table .gray { color: #9e9e9e; }
    .popup-header { font-size: 0.95rem; font-weight: bold; color: #c62828; margin-bottom: 8px; }
    .popup-sub { font-size: 0.75rem; color: #666; margin-bottom: 10px; }
    .popup-link { display: inline-block; margin-top: 8px; background: #c62828; color: white; padding: 6px 14px; border-radius: 20px; text-decoration: none; font-size: 0.78rem; }
    .popup-link:hover { background: #b71c1c; }
    
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      font-size: 1.1rem;
      color: #c62828;
    }
    .loading-overlay.hide { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #ffcdd2;
      border-top-color: #c62828;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="header">
  <h1><span>🏥</span>香港急症室輪候時間</h1>
  <div style="display:flex;align-items:center;">
    <div id="update-info">
      <div>更新時間</div>
      <div class="time" id="update-time">--:--</div>
      <div class="countdown" id="countdown">下次更新：30秒</div>
    </div>
    <button id="refresh-btn" onclick="fetchData()">🔄 立即刷新</button>
  </div>
</div>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  載入急症室數據...
</div>

<div id="side-panel">
  <div id="panel-header">
    <h3>🏥 醫院輪候排序</h3>
    <div class="sort-row">
      <button class="sort-btn active" data-sort="t1">T1 危殆</button>
      <button class="sort-btn" data-sort="t2">T2 危急</button>
      <button class="sort-btn" data-sort="t3">T3 緊急</button>
      <button class="sort-btn" data-sort="t45">T4/5</button>
    </div>
  </div>
  <div id="hospital-list"></div>
  <div id="panel-footer">點擊醫院名稱，地圖會飛到該位置並打開詳情</div>
</div>

<div id="map"></div>

<div id="legend">
  <h4>👇 緊急程度 / 輪候時間</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#c62828"></div> T1 危殆（分鐘）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div> T2 危急（分鐘）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div> T3 緊急（中位數）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div> T4/T5 次緊急/非緊急（中位數）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#bdbdbd"></div> 暂无数据</div>
</div>

<div id="info-panel">
  <div class="triage" id="panel-triage"></div>
  <div class="wt" id="panel-wt"></div>
  <div class="desc" id="panel-desc"></div>
  <div class="pct" id="panel-pct"></div>
</div>

<script>
  const API_URL = 'https://www.ha.org.hk/opendata/aed/aedwtdata2-en.json';
  const HOSPITALS_URL = 'hospitals.json';
  const REFRESH_INTERVAL = 30; // seconds

  let map, markers = {}, lastData = null, hospMap = {};
  let countdown = REFRESH_INTERVAL;
  let countdownTimer = null;
  let sortKey = 't1'; // 't1' | 't2' | 't3' | 't45'
  let activeCode = null;
  let waitTimeData = []; // store merged data for list rendering

  // Get sort value for a hospital
  function getSortVal(h, key) {
    let str;
    if (key === 't1') str = h.t1wt;
    else if (key === 't2') str = h.t2wt;
    else if (key === 't3') str = h.t3p50;
    else str = h.t45p50;
    const mins = parseMins(str);
    return mins === null ? 99999 : mins;
  }

  // Render the sorted hospital list in side panel
  function renderHospitalList() {
    const list = document.getElementById('hospital-list');
    const data = waitTimeData
      .map(h => ({ h, sortVal: getSortVal(h, sortKey) }))
      .sort((a, b) => a.sortVal - b.sortVal);

    list.innerHTML = data.map(({ h }) => {
      const hosp = h._hosp;
      const t1 = h.t1wt || 'N/A';
      const t2 = h.t2wt || 'N/A';
      const t3p50 = h.t3p50 || 'N/A';
      const t45p50 = h.t45p50 || 'N/A';
      const t1mins = parseMins(t1);
      const t2mins = parseMins(t2);
      const t3mins = parseMins(t3p50);
      const t45mins = parseMins(t45p50);

      // Badge color: worst of the 4 tiers
      let badgeColor = '#bdbdbd';
      let badgeText = 'N/A';
      const vals = [t1mins, t2mins, t3mins, t45mins].filter(v => v !== null);
      if (vals.length > 0) {
        const worst = Math.max(...vals);
        if (worst <= 5) { badgeColor = '#4caf50'; badgeText = `${worst}分鐘`; }
        else if (worst <= 15) { badgeColor = '#ff9800'; badgeText = `${worst}分鐘`; }
        else if (worst <= 30) { badgeColor = '#e65100'; badgeText = `${worst}分鐘`; }
        else if (worst <= 60) { badgeColor = '#c62828'; badgeText = `${worst}分鐘`; }
        else { badgeColor = '#b71c1c'; badgeText = `${worst}分鐘`; }
      }

      const isActive = activeCode === hosp.code;
      return `
        <div class="hosp-row${isActive ? ' active' : ''}" data-code="${hosp.code}">
          <div class="hosp-row-top">
            <span class="hosp-row-name">${hosp.name_tc}</span>
            <span class="hosp-row-badge" style="background:${badgeColor}">${badgeText}</span>
          </div>
          <div class="hosp-row-times">
            <span class="hosp-time-chip sort-chip" data-sort="t1">T1 <span>${t1}</span></span>
            <span class="hosp-time-chip sort-chip" data-sort="t2">T2 <span>${t2}</span></span>
            <span class="hosp-time-chip sort-chip" data-sort="t3">T3 <span>${t3p50}</span></span>
          </div>
        </div>
      `;
    }).join('');

    // Click to zoom
    // Row click
    list.querySelectorAll('.hosp-row').forEach(row => {
      row.addEventListener('click', e => {
        // Ignore if clicking a sort chip
        if (e.target.closest('.sort-chip')) return;
        const code = row.dataset.code;
        const m = markers[code];
        if (!m) return;
        map.flyTo(m.getLatLng(), 15, { animate: true, duration: 1 });
        m.openPopup();
        activeCode = code;
        document.querySelectorAll('.hosp-row').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
      });
    });

    // Sort chip click — sort list by that triage
    list.querySelectorAll('.sort-chip').forEach(chip => {
      chip.addEventListener('click', e => {
        e.stopPropagation();
        const key = chip.dataset.sort;
        sortKey = key;
        // Update sort button UI
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.sort-btn[data-sort="${key}"]`)?.classList.add('active');
        renderHospitalList();
      });
    });
  }
  function initMap() {
    map = L.map('map').setView([22.396, 114.274], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 17
    }).addTo(map);
  }

  // Get waiting time color
  function getColor(t1wt, t2wt, t3p50) {
    // T1 (危殆) is most critical, use it primarily
    if (t1wt && t1wt !== 'N/A') {
      const mins = parseMins(t1wt);
      if (mins === null) return '#bdbdbd';
      if (mins === 0) return '#4caf50';
      if (mins <= 5) return '#8bc34a';
      if (mins <= 15) return '#ffeb3b';
      if (mins <= 30) return '#ff9800';
      return '#f44336';
    }
    // Fall back to T2
    if (t2wt && t2wt !== 'N/A' && !t2wt.toLowerCase().includes('less than 15')) {
      return '#e53935';
    }
    // Fall back to T3
    if (t3p50) {
      const mins = parseMins(t3p50);
      if (mins === null) return '#bdbdbd';
      if (mins <= 30) return '#ff9800';
      if (mins <= 60) return '#f44336';
      return '#c62828';
    }
    return '#bdbdbd';
  }

  // Parse waiting time to minutes (handles both Chinese and English)
  function parseMins(str) {
    if (!str || str === 'N/A' || str === null) return null;
    str = String(str);
    // English: "0 minute", "1 hour 15 minutes", "less than 15 minutes"
    if (str.toLowerCase().includes('less than')) {
      const m = str.match(/less than\s*(\d+)/i);
      return m ? parseInt(m[1]) : null;
    }
    const hourMatch = str.match(/(\d+(?:\.\d+)?)\s*hour/i);
    if (hourMatch) {
      const hours = parseFloat(hourMatch[1]);
      const minMatch = str.match(/(\d+)\s*minute/i);
      return Math.round(hours * 60 + (minMatch ? parseInt(minMatch[1]) : 0));
    }
    const minMatch = str.match(/(\d+)\s*minute/i);
    if (minMatch) return parseInt(minMatch[1]);
    // Chinese fallback
    const cnHour = str.match(/(\d+(?:\.\d+)?)\s*小時/);
    if (cnHour) return Math.round(parseFloat(cnHour[1]) * 60);
    const cnMin = str.match(/(\d+)\s*分鐘/);
    if (cnMin) return parseInt(cnMin[1]);
    return null;
  }

  // Build popup content
  function buildPopup(h) {
    const t1 = h.t1wt || 'N/A';
    const t2 = h.t2wt || 'N/A';
    const t3p50 = h.t3p50 || 'N/A';
    const t3p95 = h.t3p95 || 'N/A';
    const t45p50 = h.t45p50 || 'N/A';
    const t45p95 = h.t45p95 || 'N/A';
    const t1mins = parseMins(t1);
    const t2mins = parseMins(t2);
    const t3mins = parseMins(t3p50);
    const t45mins = parseMins(t45p50);

    const t1color = t1mins === null ? 'gray' : t1mins <= 5 ? 'green' : t1mins <= 15 ? 'yellow' : t1mins <= 30 ? 'orange' : 'red';
    const t2color = t2mins === null ? 'gray' : t2.toLowerCase().includes('less than 15') ? 'green' : t2mins && t2mins <= 30 ? 'yellow' : 'orange';
    const t3color = t3mins === null ? 'gray' : t3mins <= 30 ? 'yellow' : t3mins <= 60 ? 'orange' : 'red';
    const t45color = t45mins === null ? 'gray' : t45mins <= 60 ? 'yellow' : t45mins <= 120 ? 'orange' : 'red';

    return `
      <div class="popup-header">${h._hosp.name_tc}</div>
      <div class="popup-sub">${h._hosp.name_en}</div>
      <table class="popup-table">
        <tr><th colspan="2">病人類別</th><th>最長輪候</th><th>等候時間</th></tr>
        <tr>
          <td style="background:#c62828;width:4px;padding:0;"></td>
          <td class="triage-col">危殆 (T1)</td>
          <td class="time-col ${t1color}">${t1}</td>
        </tr>
        <tr>
          <td style="background:#e53935;width:4px;padding:0;"></td>
          <td class="triage-col">危急 (T2)</td>
          <td class="time-col ${t2color}">${t2}</td>
        </tr>
        <tr>
          <td style="background:#ff9800;width:4px;padding:0;"></td>
          <td class="triage-col">緊急 (T3) 中位數</td>
          <td class="time-col ${t3color}">${t3p50}</td>
        </tr>
        <tr>
          <td style="background:#f44336;width:4px;padding:0;"></td>
          <td class="triage-col">次緊急/非緊急 (T4/5) 中位數</td>
          <td class="time-col ${t45color}">${t45p50}</td>
        </tr>
      </table>
      <div style="font-size:0.7rem;color:#888;margin-top:6px;">
        📊 緊急(75th): ${t3p95} | 次緊急(75th): ${t45p95}
      </div>
      <div style="font-size:0.7rem;color:#aaa;margin-top:4px;">
        🕐 即時更新
      </div>
    `;
  }

  // Create or update marker
  function updateMarker(h) {
    const hosp = h._hosp;
    const lat = hosp.lat;
    const lon = hosp.lon;
    const t1wt = h.t1wt || 'N/A';
    const t2wt = h.t2wt || 'N/A';
    const t3p50 = h.t3p50 || 'N/A';
    const color = getColor(t1wt, t2wt, t3p50);

    // Short label (first 2 chars of TC name)
    const label = hosp.name_tc.substring(0, 2);

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color};
        border:3px solid white;
        border-radius:50%;
        width:34px;height:34px;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
        color:white;font-weight:bold;font-size:11px;
        cursor:pointer;
      ">${label}</div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    const key = hosp.code;
    if (markers[key]) {
      markers[key].setIcon(icon);
      markers[key].setPopupContent(buildPopup(h));
    } else {
      const marker = L.marker([lat, lon], { icon }).addTo(map);
      marker.bindPopup(buildPopup(h));
      markers[key] = marker;
    }
  }

  // Fetch data from HA API + hospitals.json, merge and update map
  async function fetchData() {
    try {
      const [haResp, hospResp] = await Promise.all([
        fetch(API_URL),
        fetch(HOSPITALS_URL)
      ]);
      const haJson = await haResp.json();
      const hospJson = await hospResp.json();

      // Build hospital lookup by name_en (handle alias mismatches)
      hospMap = {};
      hospJson.forEach(h => {
        hospMap[h.name_en] = h;
        hospMap[h.name_tc] = h;
      });
      // Alias for St. John / St John mismatch
      hospJson.forEach(h => {
        if (h.name_en === 'St. John Hospital') {
          hospMap['St John Hospital'] = h;
        }
        // Normalize "Hospital" -> "Hosp" for API name lookup (API: "X Hospital", json: "X Hosp")
        const apiForm = h.name_en.replace(/Hosp$/, 'Hospital');
        if (apiForm !== h.name_en) hospMap[apiForm] = h;
      });

      // Update time display
      const t = haJson.updateTime || '';
      document.getElementById('update-time').textContent = t;

      // Merge HA data with hospital coords, then update markers
      waitTimeData = [];
      haJson.waitTime.forEach(hosp => {
        const match = hospMap[hosp.hospName];
        if (match) {
          const merged = { ...hosp, _hosp: match };
          waitTimeData.push(merged);
          updateMarker(merged);
        }
      });

      renderHospitalList();

      // Hide loading
      document.getElementById('loading').classList.add('hide');
    } catch (err) {
      console.error('Fetch error:', err);
    }
  }

  // Countdown timer
  function startCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    countdown = REFRESH_INTERVAL;
    countdownTimer = setInterval(() => {
      countdown--;
      const el = document.getElementById('countdown');
      if (el) el.textContent = `下次更新：${countdown}秒`;
      if (countdown <= 0) {
        fetchData();
        countdown = REFRESH_INTERVAL;
      }
    }, 1000);
  }

  // Init
  initMap();
  fetchData();
  startCountdown();

  // Sort button listeners
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortKey = btn.dataset.sort;
      renderHospitalList();
    });
  });
</script>
</body>
</html>
